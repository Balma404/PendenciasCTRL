# Ambiente de DESENVOLVIMENTO com hot-reload.
# O código é montado no container e o Next roda em modo dev:
# qualquer alteração aparece na hora, sem precisar rebuildar.
#
# Uso:  docker compose -f docker-compose.dev.yml up
# Acesse: http://localhost:3003
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pendencias
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pendencias"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/pendencias
      UPLOADS_DIR: /app/uploads
    ports:
      - "3003:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
  node_modules:
